name: privacy_vault
description: "隐私保险箱 - 本地化隐私文件加密管理"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # 路由
  go_router: ^14.8.1

  # 依赖注入
  get_it: ^8.0.3
  injectable: ^2.5.0

  # 数据库
  drift: ^2.26.1
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.7.3

  # 加密
  pointycastle: ^3.9.1

  # 安全存储
  flutter_secure_storage: ^9.2.4

  # 生物识别
  local_auth: ^2.3.0

  # 文件与媒体
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  mime: ^2.0.0
  file_picker: ^8.3.7
  image: ^4.5.3
  camera: ^0.11.1
  share_plus: ^10.1.4
  gal: ^2.3.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6

  # UI
  material_symbols_icons: ^4.2815.0
  flutter_animate: ^4.5.2

  # 数据类
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  drift_dev: ^2.26.1

  # 测试
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/privacy_policy.md
    - assets/user_agreement.md
